version: '3.9'
services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root         # rootパスワードは必須なので残します
      MYSQL_DATABASE: portfolio_db      # DbConfigのURL末尾に合わせる
      MYSQL_USER: test_user             # DbConfigのDB_USERに合わせる
      MYSQL_PASSWORD: test_pass         # DbConfigのDB_PASSに合わせる
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
    driver: local
